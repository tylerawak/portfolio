<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="36" y="36" width="1128" height="558" rx="14" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Name -->
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="80" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">Tyler<tspan fill="#7c6af7">AWak</tspan></text>

  <!-- Subtitle -->
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="1">Web Developer &amp; Tool Builder</text>

  <!-- Tool pills -->
  <rect x="290" y="390" width="160" height="36" rx="18" fill="rgba(124,106,247,0.15)" stroke="rgba(124,106,247,0.4)" stroke-width="1"/>
  <text x="370" y="413" font-family="Arial, sans-serif" font-size="16" fill="#a89af7" text-anchor="middle">YTClip</text>

  <rect x="520" y="390" width="160" height="36" rx="18" fill="rgba(124,106,247,0.15)" stroke="rgba(124,106,247,0.4)" stroke-width="1"/>
  <text x="600" y="413" font-family="Arial, sans-serif" font-size="16" fill="#a89af7" text-anchor="middle">MeetGrid</text>

  <rect x="750" y="390" width="160" height="36" rx="18" fill="rgba(124,106,247,0.15)" stroke="rgba(124,106,247,0.4)" stroke-width="1"/>
  <text x="830" y="413" font-family="Arial, sans-serif" font-size="16" fill="#a89af7" text-anchor="middle">SN2 Tracker</text>

  <text x="600" y="546" font-family="monospace" font-size="19" fill="rgba(255,255,255,0.2)" text-anchor="middle">tylerawak.net</text>
</svg>
